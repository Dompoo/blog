<h2>글 목록</h2>

<table>
    <thead>
    <tr>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일시</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="writing : ${writingList}">
        <td>
            <a th:href="@{|/writing/${writing.getId()}|}" th:text="${writing.getTitle()}"> </a>
        </td>
        <td th:text="${writing.getUsername()}"></td>
        <td th:text="${writing.getCreateDate()}"></td>
    </tr>
    </tbody>
</table>
