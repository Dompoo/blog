<h2>댓글</h2>

<table>
    <thead>
    <tr>
        <th>작성자</th>
        <th>작성 시간</th>
        <th>내용</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="comment : ${commentList}">
        <td th:text="${comment.getUsername()}"></td>
        <td th:text="${comment.getCreateDate()}"></td>
        <td th:text="${comment.getContent()}"></td>
    </tr>
    </tbody>
</table>
